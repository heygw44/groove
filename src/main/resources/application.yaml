spring:
  application:
    name: groove
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:groove}?characterEncoding=UTF-8&serverTimezone=UTC
    username: ${DB_USERNAME:groove}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mvc:
    problemdetails:
      enabled: true

  security:
    user:
      password: disabled

server:
  port: 8080
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:native}
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.groove: INFO

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-minimum-256-bits-long}
  access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:1800}
  refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL_SECONDS:1209600}

# 인증 엔드포인트 Rate Limit (#23). 정책 수치는 운영 측정 후 W10에서 재조정 가능.
groove:
  auth:
    rate-limit:
      login:
        capacity: ${AUTH_RATE_LIMIT_LOGIN_CAPACITY:10}
        refill-period: ${AUTH_RATE_LIMIT_LOGIN_REFILL_PERIOD:PT1M}
      signup:
        capacity: ${AUTH_RATE_LIMIT_SIGNUP_CAPACITY:3}
        refill-period: ${AUTH_RATE_LIMIT_SIGNUP_REFILL_PERIOD:PT1M}

# CORS default 는 모든 origin 차단. profile 별 yaml 또는 환경 변수로 override.
# 운영 환경에서는 cors.allowed-origins 를 명시적 도메인 화이트리스트로 설정.
cors:
  allowed-origin-patterns: []
  allowed-origins: []
  allowed-methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
  allowed-headers: ["*"]
  exposed-headers: [X-Request-Id]
  allow-credentials: false
  max-age-seconds: 3600
