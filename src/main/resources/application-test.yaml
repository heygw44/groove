spring:
  datasource:
    # Testcontainers ServiceConnection 이 실제 자격을 주입하므로 placeholder 통과용 더미.
    password: test
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true

# 테스트 전용 JWT 시크릿 — 256bit 이상 필요 (JwtProperties 검증).
jwt:
  secret: test-only-secret-key-minimum-256-bits-long-for-jwt-signing

# 테스트용 CORS — 브라우저 정책상 와일드카드 origin + credentials 조합은 동작하지 않으므로
# 로컬 개발 origin 패턴(임의 포트) 으로 한정.
cors:
  allowed-origin-patterns: ["http://localhost:[*]"]
  allow-credentials: true

logging:
  level:
    root: WARN
    com.groove: DEBUG

# 테스트 기본값 — 단위/슬라이스 테스트가 동일 IP로 다회 호출해도 영향이 없도록 큰 한도.
# 한도 검증 통합 테스트는 @TestPropertySource 로 별도 override.
groove:
  auth:
    rate-limit:
      login:
        capacity: 100000
        refill-period: PT1M
      signup:
        capacity: 100000
        refill-period: PT1M
