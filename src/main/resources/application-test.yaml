spring:
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true

# 테스트용 CORS — 브라우저 정책상 와일드카드 origin + credentials 조합은 동작하지 않으므로
# 로컬 개발 origin 패턴(임의 포트) 으로 한정.
cors:
  allowed-origin-patterns: ["http://localhost:[*]"]
  allow-credentials: true

logging:
  level:
    root: WARN
    com.groove: DEBUG
