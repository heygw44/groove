language: "ko-KR"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  commit_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
  path_filters:
    - "!**/*.md"
    - "!.gitignore"
    - "!.dockerignore"
    - "!.env.example"
  path_instructions:
    - path: "backend/src/main/java/**/*.java"
      instructions: |
        Spring Boot 4.1 / Java 21 코드 리뷰:
        - 패키지는 도메인 우선 수직 슬라이싱(com.groove.<도메인>.{api,application,domain}). Controller/Service/Repository 폴더 구조 아님 (ADR: docs/decisions/package-structure.md)
        - 계층 순서 api → application → domain 준수, 역방향 의존 금지
        - 도메인 간 단방향 직접 참조는 ADR 이 허용함(JPA 엔티티 연관 포함, 예 OrderItem→Album). cross-domain 참조 자체를 위반으로 지적하지 말 것. 단 역방향·순환 의존은 지적(순환 현황은 ADR "한계" 절·#349 에 기록됨)
        - api.dto 는 경계 계약이라 application 이 참조해도 됨
        - JPA/Hibernate N+1, 영속성 컨텍스트 경계, 트랜잭션 경계·롤백 정책
        - ProblemDetail (RFC 7807) 예외 응답, GlobalExceptionHandler 의 ErrorCode 매핑
        - Lombok 남용 방지(@Data 지양, @Builder/@Value 선호)
        - 보안: SQL injection, 입력값 검증(@Valid/@Validated)
        - 하드코딩 금지: 매직 넘버는 상수/설정값으로 분리
    - path: "backend/src/main/java/**/api/**/*.java"
      instructions: |
        api(표현) 레이어 추가 기준:
        - 비즈니스 로직이 컨트롤러에 새지 않도록 확인(오케스트레이션은 application)
        - 요청/응답 DTO 분리 및 @Valid 적용 확인
        - HTTP 상태 코드가 의미에 맞는지 확인
    - path: "backend/src/main/java/**/*Repository.java"
      instructions: |
        Repository 추가 기준:
        - JPQL/네이티브 쿼리의 성능 및 인덱스 활용 확인
        - 불필요한 전체 컬럼 조회 지양(Projection 활용 권장)
    - path: "backend/src/test/**/*.java"
      instructions: |
        테스트 코드 리뷰:
        - AAA (Arrange/Act/Assert) 구조 명확성
        - 테스트 격리: 다른 테스트에 영향을 주지 않는지 확인
        - 의미 없는 assert (항상 통과) 금지
        - 테스트 명명: 한국어 또는 영어 일관성 유지
        - 단위 테스트와 통합 테스트의 역할 구분
    - path: "backend/src/main/resources/db/migration/**"
      instructions: |
        Flyway 마이그레이션 리뷰:
        - 명명 규칙 확인 (V{version}__{description}.sql)
        - 되돌리기 불가능한 DDL 변경사항 (DROP, 컬럼 삭제) 경고
        - NOT NULL 컬럼 추가 시 기본값 또는 백필 전략 확인
        - 대용량 테이블 변경 시 Lock 위험 경고
    - path: "backend/src/main/resources/**/*.yaml"
      instructions: |
        설정 파일 리뷰:
        - 민감 정보 (비밀번호, 토큰) 하드코딩 금지
        - 환경변수 바인딩 시 기본값의 보안 적절성 확인
        - 프로파일별 설정 분리가 올바른지 확인

chat:
  auto_reply: true
