services:
  mysql:
    image: mysql:8.4
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:-groove}
      MYSQL_USER: ${DB_USERNAME:-groove}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - groove-net

  app:
    # 컨텍스트는 루트(Dockerfile 이 frontend/ 도 COPY 해 UI 통합 빌드).
    # 단일 인스턴스 전제. 수평 확장하면 rate limit 버킷(인스턴스 로컬 Caffeine)이 분리돼 무력화되므로
    # 확장 시 분산 버킷(bucket4j-redis) 필요.
    build:
      context: .
      dockerfile: backend/Dockerfile
    # 호스트 포트 미발행. 외부 접근은 nginx(:80)를 통해서만.
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - groove-net

  nginx:
    # 리버스 프록시. gzip·정적 캐시·Referrer-Policy 를 일괄 처리. 단일 upstream(app), LB 아님.
    # TLS 종단(:443)은 docker-compose.tls.yml override 로 활성화한다.
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      # 기본 HTTP(nginx.conf). TLS 실행 시 NGINX_CONF=nginx-tls.conf 로 스왑.
      - ./docker/nginx/${NGINX_CONF:-nginx.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
    networks:
      - groove-net

  # 관측 스택 — 데모 전용, 기본 비활성(profiles 키). 활성화: docker compose --profile observability up
  #   Grafana http://localhost:3000 (익명 Viewer), Prometheus http://localhost:9090
  # ⚠️ 로컬 신뢰 네트워크 데모 전용, 외부/공유 환경 노출 금지. Grafana 는 익명 Viewer + admin 기본 비번
  #   ('admin') + :3000 퍼블리시 상태다. 공개망에 띄우려면 익명 OFF·강한 GRAFANA_ADMIN_PASSWORD·포트 비공개로 하드닝.
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    depends_on:
      app:
        condition: service_healthy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - groove-net

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    depends_on:
      - prometheus
    environment:
      # 데모 편의: 익명 Viewer 열람 허용(로그인 없이 대시보드 확인). admin 비번은 env 주입(기본 데모값).
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - groove-net

networks:
  groove-net:
    driver: bridge

volumes:
  mysql-data:
  grafana-data:
