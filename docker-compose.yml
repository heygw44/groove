services:
  mysql:
    image: mysql:8.4
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:-groove}
      MYSQL_USER: ${DB_USERNAME:-groove}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - groove-net

  app:
    # 백엔드는 backend/ 하위(#131). 컨텍스트는 루트 유지 — Dockerfile 이 frontend/ 도 COPY 해 UI 통합 빌드.
    # 단일 인스턴스 전제 — deploy.replicas 등으로 수평 확장하면 rate limit 버킷(인스턴스 로컬 Caffeine)이
    # 인스턴스별로 분리돼 무력화된다. 확장 시 분산 버킷(bucket4j-redis) 필요(#164, ARCHITECTURE §10.5).
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - groove-net

networks:
  groove-net:
    driver: bridge

volumes:
  mysql-data:
