services:
  mysql:
    image: mysql:8.4
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:-groove}
      MYSQL_USER: ${DB_USERNAME:-groove}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - groove-net

  app:
    # 백엔드는 backend/ 하위(#131). 컨텍스트는 루트 유지 — Dockerfile 이 frontend/ 도 COPY 해 UI 통합 빌드.
    # 단일 인스턴스 전제 — deploy.replicas 등으로 수평 확장하면 rate limit 버킷(인스턴스 로컬 Caffeine)이
    # 인스턴스별로 분리돼 무력화된다. 확장 시 분산 버킷(bucket4j-redis) 필요(#164, ARCHITECTURE §10.5).
    build:
      context: .
      dockerfile: backend/Dockerfile
    # 호스트 포트 미발행 — 외부 접근은 nginx(:80)를 통해서만(#265). healthcheck 는 컨테이너 내부 localhost:8080.
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - groove-net

  nginx:
    # 리버스 프록시(#265) — gzip · 정적 캐시 · Referrer-Policy 를 일괄 처리.
    # 단일 upstream(app) 전제 — LB 아님. 고정 태그로 재현성 확보.
    # TLS 종단(:443)은 docker-compose.tls.yml override 로 활성화한다(#270, docs/ARCHITECTURE.md §10.6).
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      # 기본은 HTTP(nginx.conf). TLS 실행 시 NGINX_CONF=nginx-tls.conf 로 스왑(override 와 함께).
      - ./docker/nginx/${NGINX_CONF:-nginx.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
    networks:
      - groove-net

networks:
  groove-net:
    driver: bridge

volumes:
  mysql-data:
