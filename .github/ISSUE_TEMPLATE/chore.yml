name: 유지보수 / 문서
description: 리팩토링, 의존성 업데이트, 문서 작업 이슈
title: "[chore] "
labels: ["type:chore"]
body:
  - type: textarea
    id: purpose
    attributes:
      label: 목적
      description: 이 이슈의 목적을 1~2문장으로 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 내용
      value: |
        - [ ] 항목 1
        - [ ] 항목 2
    validations:
      required: true

  - type: textarea
    id: dod
    attributes:
      label: 완료 조건 (DoD)
      value: |
        - [ ] 조건 1
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: 세부 타입
      options:
        - chore (리팩토링 / 의존성)
        - docs (문서)
        - test (테스트 코드)
        - improvement (측정 후 개선)
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: 예상 작업량
      options:
        - "S (≤4시간)"
        - "M (0.5~1일)"
        - "L (1~2일)"
        - "XL (2일+)"
    validations:
      required: true

  - type: textarea
    id: depends
    attributes:
      label: 선행 / 관련
      value: |
        - Related: #

  - type: textarea
    id: notes
    attributes:
      label: 비고
