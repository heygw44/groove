name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# PR당 이전 실행 취소 — 푸시 연타 시 러너 분 절약. group 에 github.ref 포함으로 PR/브랜치별 독립 취소.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 최소 권한 — 명시하지 않은 스코프는 none. (커버리지 PR 코멘트 액션 도입 시에만 pull-requests: write 추가)
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest   # Docker 사전 설치 → Testcontainers MySQL 그대로 동작 (services: mysql 추가 금지)
    timeout-minutes: 30      # 콜드 실행 시 MySQL 이미지 pull 여유 + 무한 hang 방지
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false   # 읽기 전용 CI — 토큰을 .git/config 에 남기지 않음 (무단 push 방지)

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: '21'
          # 캐싱은 setup-gradle 가 전담 → 여기서 cache 옵션을 켜면 이중 캐시로 충돌. 의도적 생략.

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build, test & coverage gate
        # build → check → test(Testcontainers MySQL) → jacocoTestCoverageVerification 한 번에.
        # 외부 시크릿 불필요: test 프로파일이 jwt.secret / payment.mock.webhook-secret 자급자족.
        # --no-daemon 미사용: setup-gradle 가 daemon 수명·캐시 flush 를 관리한다.
        # 백엔드는 backend/ 로 이동(#131). frontendBuild 는 ../frontend 를 읽으므로 전체 checkout 이면 동작.
        working-directory: backend
        env:
          # CI 러너는 job 종료 후 통째 폐기되어 컨테이너 누수가 없고, 본 프로젝트엔 Ryuk 가 긴 스위트에서
          # 컨테이너를 회수한 전례가 있어(local 환경 gotcha) ephemeral CI 에선 Ryuk 를 끈다 — 부수 효과로
          # 컨테이너 하나가 줄어 메모리 여유도 생긴다. (#222 CI 실패의 근본 원인은 Ryuk 가 아니라 캐시된
          # @SpringBootTest 컨텍스트들의 Hikari idle 커넥션 누적 → MySQL max_connections 근접·OOM 이었고,
          # 그 수정은 application-test.yaml 의 spring.datasource.hikari.minimum-idle=0 이다.)
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: ./gradlew build

      - name: Upload test & coverage reports
        if: always()   # 테스트 실패 시에도 리포트 회수
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reports
          path: |
            backend/build/reports/tests/
            backend/build/reports/jacoco/
          retention-days: 7
