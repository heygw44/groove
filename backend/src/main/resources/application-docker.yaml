management:
  endpoints:
    web:
      exposure:
        # 데모는 health 에 더해 prometheus 노출. 메트릭 전용 Basic 체인이 보호하므로 상시 노출해도 익명 접근은 401.
        include: ${MANAGEMENT_EXPOSURE:health,prometheus}
  endpoint:
    health:
      show-details: ${HEALTH_SHOW_DETAILS:when_authorized}
  metrics:
    distribution:
      # p95 패널(histogram_quantile)용 *_bucket 시리즈 생성. docker 데모 한정. uri·status·method 조합마다
      # 버킷 세트가 생겨 운영 확장 시 시계열이 폭증하므로(SLO 버킷 제한 필요) 그대로 prod 로 복사하지 말 것.
      percentiles-histogram:
        http.server.requests: true

# Swagger/OpenAPI 배포 기본 비공개. 전 API 표면의 익명 노출을 차단한다.
# enabled=false 면 /v3/api-docs·/swagger-ui 가 404. 데모 노출은 SPRINGDOC_ENABLED=true.
springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}

# Refresh 쿠키 Secure. 기본 true. HTTPS 또는 TLS 종단 프록시(X-Forwarded-Proto 전달) 뒤를 전제로 한다.
# TLS 없이 평문 HTTP(특히 비-localhost)로 노출하는 데모는 브라우저가 Secure 쿠키를 저장하지 않아 세션이
# 안 유지되므로, 그 경우에만 AUTH_REFRESH_COOKIE_SECURE=false 로 내린다.
auth:
  refresh-cookie:
    secure: ${AUTH_REFRESH_COOKIE_SECURE:true}

# docker 는 env 로 명시 화이트리스트 주입(콤마 구분 문자열은 List 로 자동 변환).
# 예) CORS_ALLOWED_ORIGINS=https://example.com,https://admin.example.com
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}

logging:
  level:
    root: WARN
    com.groove: INFO

# 멀티노드 분산 캐시. base(단일 인스턴스)는 caffeine, docker/prod 다중화만 redis 로 노드 간 @CacheEvict 일관.
# 직렬화는 Boot 기본 JDK. SPRING_CACHE_TYPE 으로 loadtest Before/After 토글(none/caffeine/redis).
spring:
  cache:
    type: ${SPRING_CACHE_TYPE:redis}
    redis:
      time-to-live: 60s                # base caffeine 의 expireAfterWrite=60s 와 동일 백스톱
      key-prefix: "groove:cache:v1:"   # v1 = 직렬화 스키마 버전. 호환 깨짐 시 v2 로 올려 롤링 배포 cross-version 역직렬화 격리
      use-key-prefix: true
      cache-null-values: false         # DETAIL 미스(404) 미캐시 — base caffeine 거동 유지

# 멀티노드 분산 rate-limit. base(단일 인스턴스)는 caffeine, docker/prod 다중화만 redis 로 노드 간 토큰 버킷 공유 →
# 동일 IP/회원 한도가 인스턴스 수와 무관하게 유지. RATE_LIMIT_STORE 로 loadtest Before(caffeine=한도 N배)/After 토글.
groove:
  rate-limit:
    store: ${RATE_LIMIT_STORE:redis}
