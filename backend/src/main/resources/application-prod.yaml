# prod 프로파일 — 실 결제(토스페이먼츠) 배포 경로.
# docker 는 Mock PG 데모라 실 결제가 아니다. 실 결제는 SPRING_PROFILES_ACTIVE=prod 로 기동한다.
# TossPaymentConfig 가 @Profile(dev/prod)라 prod 에서 실 Toss confirm 이 켜지고 MockPaymentGateway 는 제외된다.
#
# 필수 운영 시크릿(미커밋 env 주입, 약한/플레이스홀더 값이면 기동 거부):
#   - DB_PASSWORD / MYSQL_ROOT_PASSWORD : 강한 고유값 (DbSecretGuard)
#   - JWT_SECRET / EMAIL_HASH_SECRET    : 256bit 이상 고유값 (SecretPlaceholderGuard)
#   - PAYMENT_TOSS_CLIENT_KEY / PAYMENT_TOSS_SECRET_KEY : 토스 실 키
#   - PAYMENT_TOSS_SUCCESS_URL / PAYMENT_TOSS_FAIL_URL  : 운영 도메인 리다이렉트 URL
#       (base 의 폴백 없는 ${PAYMENT_TOSS_*} 상속 — dev 의 localhost 기본값과 달리 운영 URL 주입 강제)

# Swagger/OpenAPI 운영 비공개 강제. docker 와 달리 env 토글 없이 항상 비공개(/v3/api-docs·/swagger-ui 404).
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Refresh 쿠키 Secure. 운영(nginx 443 TLS 종단) 전제로 base 기본값(true)을 명시.
auth:
  refresh-cookie:
    secure: ${AUTH_REFRESH_COOKIE_SECURE:true}

# 운영 도메인 화이트리스트 env 주입(동일 오리진 nginx 서빙이면 빈 값 OK).
# 와일드카드 + credentials 조합은 CorsProperties 가 기동 거부한다.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}

# health 상세는 base 의 show-details: never 를 상속(override 없음 — docker 의 when_authorized 보다 엄격).
logging:
  level:
    root: WARN
    com.groove: INFO

# 멀티노드 분산 캐시. type 은 redis 로 고정한다 — env override 면 잘못된 값 하나로 node-local 부팅돼 노드 간 무효화가 깨진다.
# (loadtest 토글은 docker 프로파일에만). 직렬화는 Boot 기본 JDK, 호환 깨짐 시 key-prefix v1→v2 로 격리.
spring:
  cache:
    type: redis
    redis:
      time-to-live: 60s
      key-prefix: "groove:cache:v1:"
      use-key-prefix: true
      cache-null-values: false
