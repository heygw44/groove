# prod 프로파일 (M17) — 실 결제(토스페이먼츠) 배포 경로.
#
# docker 프로파일은 Mock PG 데모(의도된 설계)이며 실 결제가 아니다. 실 결제를 받으려면
# SPRING_PROFILES_ACTIVE=prod 로 기동한다: TossPaymentGateway/TossPaymentConfig 가 @Profile(dev/prod)라
# prod 에서 실 Toss confirm 흐름이 활성화되고, MockPaymentGateway(@Profile local/test/docker)는 제외된다.
#
# 필수 운영 시크릿(미커밋 env 로 주입 — 약한/플레이스홀더 값이면 기동 거부):
#   - DB_PASSWORD / MYSQL_ROOT_PASSWORD : 강력한 고유값 (DbSecretGuard @Profile("prod") 약한값 거부)
#   - JWT_SECRET / EMAIL_HASH_SECRET    : 256bit 이상 고유값 (SecretPlaceholderGuard)
#   - PAYMENT_TOSS_CLIENT_KEY / PAYMENT_TOSS_SECRET_KEY : 토스 실 키 (secret 은 가드 적용)
#   - PAYMENT_TOSS_SUCCESS_URL / PAYMENT_TOSS_FAIL_URL  : 운영 도메인 리다이렉트 URL
#       (base application.yaml 의 폴백 없는 ${PAYMENT_TOSS_*} 를 상속 — dev 의 localhost 기본값과 달리 운영 URL 주입 강제)

# Swagger/OpenAPI 운영 비공개 강제. docker 는 env 토글(${SPRINGDOC_ENABLED:false})이지만
# prod 는 하드코딩으로 항상 비공개 — /v3/api-docs·/swagger-ui 미등록(404).
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Refresh 쿠키 Secure. 운영(HTTPS — nginx 443 TLS 종단) 전제로 base 기본값(true)을 명시.
auth:
  refresh-cookie:
    secure: ${AUTH_REFRESH_COOKIE_SECURE:true}

# 운영 도메인 화이트리스트 env 주입(동일 오리진 nginx 서빙이면 빈 값 유지 OK).
# 와일드카드 + credentials 조합은 CorsProperties 가 기동 거부한다.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}

# health 상세는 base 의 show-details: never 를 상속(override 없음 — docker 의 when_authorized 보다 엄격).
logging:
  level:
    root: WARN
    com.groove: INFO
