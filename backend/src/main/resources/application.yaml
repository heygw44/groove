spring:
  application:
    name: groove
  # 활성 프로파일은 외부에서 주입한다(SPRING_PROFILES_ACTIVE). 폴백이 없어 미설정 시 default 만 활성된다.
  # 그러면 LocalDataSeeder(@Profile("local"))가 안 돌아 데모 시드가 운영 DB 에 유입되지 않는다. 로컬은 bootRun 이 local 을 주입한다.

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:groove}?characterEncoding=UTF-8&serverTimezone=UTC
    username: ${DB_USERNAME:groove}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mvc:
    problemdetails:
      enabled: true

  data:
    web:
      pageable:
        # 공개 페이징 보호. ?size 남용을 막아 한 번에 최대 100건(카탈로그 규모상 충분).
        default-page-size: 20
        max-page-size: 100

  # 카탈로그 조회 캐시(Caffeine in-process, 단일 인스턴스라 Redis 불필요).
  # 대상은 albumDetail(단건), albumLandingList(랜딩 첫 페이지). 60s TTL 은 stock·평점 staleness 백스톱이고, admin 쓰기는 @CacheEvict 로 즉시 무효화한다.
  # 테스트는 type=none 으로 끄고 캐시 통합 테스트만 caffeine 으로 override 한다.
  cache:
    type: caffeine
    cache-names: albumDetail,albumLandingList
    caffeine:
      spec: ${CACHE_ALBUM_CAFFEINE_SPEC:maximumSize=2000,expireAfterWrite=60s,recordStats}

  security:
    user:
      password: disabled

server:
  port: 8080
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:native}
  # 신뢰 프록시(RemoteIpValve). 이 대역에서 온 요청만 X-Forwarded-For 를 신뢰해 getRemoteAddr() 에 실 클라이언트
  # IP 를 채운다(Rate Limit 키 정확성에 직결). 기본값은 Tomcat 기본 사설 대역 + CGNAT 100.64/10. 100.64/10 은
  # AWS NLB/ALB·GCP LB 대역이라 누락 시 전 사용자가 LB IP 단일 버킷을 공유한다.
  # 운영 LB 가 공인 IP 면 SERVER_TOMCAT_INTERNAL_PROXIES 에 실제 LB CIDR 정규식을 명시한다.
  tomcat:
    remoteip:
      internal-proxies: ${SERVER_TOMCAT_INTERNAL_PROXIES:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|169\.254\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|100\.6[4-9]\.\d{1,3}\.\d{1,3}|100\.[7-9]\d\.\d{1,3}\.\d{1,3}|100\.1[0-1]\d\.\d{1,3}\.\d{1,3}|100\.12[0-7]\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2\d|3[0-1])\.\d{1,3}\.\d{1,3}|0:0:0:0:0:0:0:1|::1}
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        # 기본은 health 만 노출. 메트릭 스크레이프는 MANAGEMENT_EXPOSURE=health,prometheus 로 opt-in(docker 는 기본 포함).
        # /actuator/prometheus 는 메트릭 전용 Basic 체인이 보호하므로 익명 접근은 401, 스크레이퍼는 metrics.scrape.* 로 인증.
        include: ${MANAGEMENT_EXPOSURE:health}
  endpoint:
    health:
      show-details: never

# /actuator/prometheus 스크레이프 전용 Basic 자격증명(nginx 가 외부로 위임하므로 JWT 본 체인과 분리).
# password 는 폴백 없는 env 바인딩 — 운영/스테이징이 알려진 값으로 폴백하는 것을 차단한다. 데모·테스트 값은
# application-{local,test}.yaml, docker/dev/prod 는 env(.env). prod 추가 방어는 MetricsScrapeSecretGuard.
metrics:
  scrape:
    username: ${METRICS_SCRAPE_USERNAME:metrics}
    password: ${METRICS_SCRAPE_PASSWORD}

logging:
  level:
    root: INFO
    com.groove: INFO

# OpenAPI/Swagger UI(코드에서 자동 생성). local/test 는 노출, docker/prod 는 기본 비공개로 override 한다.
# 아래는 노출 시 UI 옵션. enabled 는 여기서 지정하지 않아 기본 true 이고 프로파일이 override 한다.
springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

jwt:
  # 시크릿은 env 로 주입(미설정 시 기동 실패가 의도된 동작). 폴백은 application-local/test.yaml.
  secret: ${JWT_SECRET}
  access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:1800}
  refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL_SECONDS:1209600}

# 이메일 점유 해시 HMAC 키. JWT 와 분리된 전용 시크릿(키 1개=용도 1개). 폴백은 application-local/test.yaml.
email:
  hash:
    secret: ${EMAIL_HASH_SECRET}

# Refresh Token 쿠키. HttpOnly; Secure; SameSite=Strict 로 JS 접근을 차단한다.
# 운영(HTTPS)은 secure=true 기본, 로컬 개발(HTTP)은 프로파일에서 false 로 override.
auth:
  refresh-cookie:
    secure: ${AUTH_REFRESH_COOKIE_SECURE:true}

# 인증 엔드포인트 Rate Limit.
groove:
  auth:
    rate-limit:
      login:
        capacity: ${AUTH_RATE_LIMIT_LOGIN_CAPACITY:10}
        refill-period: ${AUTH_RATE_LIMIT_LOGIN_REFILL_PERIOD:PT1M}
      signup:
        capacity: ${AUTH_RATE_LIMIT_SIGNUP_CAPACITY:3}
        refill-period: ${AUTH_RATE_LIMIT_SIGNUP_REFILL_PERIOD:PT1M}
      password-change:
        capacity: ${AUTH_RATE_LIMIT_PASSWORD_CHANGE_CAPACITY:5}
        refill-period: ${AUTH_RATE_LIMIT_PASSWORD_CHANGE_REFILL_PERIOD:PT1M}
  # 응답 보안 헤더. CSP 는 기본 Report-Only, 운영 관측 후 GROOVE_CSP_REPORT_ONLY=false 로 enforce.
  security:
    csp:
      enabled: ${GROOVE_CSP_ENABLED:true}
      report-only: ${GROOVE_CSP_REPORT_ONLY:true}
      # Toss 결제 위젯(iframe)은 *.tosspayments.com 에서 로드된다. 미설정 시 코드 기본값.
      policy: ${GROOVE_CSP_POLICY:}
  # 선착순 쿠폰 발급 Rate Limit. 회원당 발급 횟수 제한, JWT memberId 키잉(IP 폴백).
  coupon:
    rate-limit:
      issue:
        capacity: ${COUPON_RATE_LIMIT_ISSUE_CAPACITY:10}
        refill-period: ${COUPON_RATE_LIMIT_ISSUE_REFILL_PERIOD:PT1M}
    # 만료 회원 쿠폰 배치. cron="-" 면 비활성화.
    expiration:
      cron: ${COUPON_EXPIRATION_CRON:0 0 * * * *}
      batch-size: ${COUPON_EXPIRATION_BATCH_SIZE:1000}
    # 취소/환불 복원. 복원 시점에 이미 만료된 쿠폰을 now + grace 로 연장해 되살린다.
    restore:
      grace: ${COUPON_RESTORE_GRACE:P7D}
  # 멱등성 인프라. cleanup-cron="-" 면 정리 스케줄러 비활성화.
  idempotency:
    ttl: ${IDEMPOTENCY_TTL:PT24H}
    # IN_PROGRESS 마커 타임아웃. 초과한 마커는 죽은 소유자가 남긴 것으로 보고 다음 동일 키 요청이 회수한다(고착 방지).
    # 진행 중인 살아있는 마커가 조기 회수돼 이중 실행되지 않도록 정상 action 최대 소요(락 대기 ~50s·PG 5s)보다 크게 둔다.
    in-progress-timeout: ${IDEMPOTENCY_IN_PROGRESS_TIMEOUT:PT10M}
    cleanup-cron: ${IDEMPOTENCY_CLEANUP_CRON:0 0 * * * *}
    cleanup-batch-size: ${IDEMPOTENCY_CLEANUP_BATCH_SIZE:1000}
  # 이벤트 아웃박스. 결제 후속 처리(배송 생성 등)를 상태 변경과 같은 트랜잭션에서 기록하고, 릴레이가 미발행
  # 이벤트를 멱등 컨슈머에 at-least-once 로 발행한다. cleanup.cron="-" 면 정리 비활성화.
  outbox:
    relay:
      interval: ${OUTBOX_RELAY_INTERVAL:PT2S}
      initial-delay: ${OUTBOX_RELAY_INITIAL_DELAY:PT5S}
      # 한 주기 최대 건수(적체 시 메모리 바운드). 나머지는 다음 주기.
      batch-size: ${OUTBOX_RELAY_BATCH_SIZE:200}
      # 재시도 상한. 초과한 poison 이벤트는 DLQ 로 격리해 정상 이벤트 슬롯 점유를 막는다.
      max-attempts: ${OUTBOX_RELAY_MAX_ATTEMPTS:5}
    cleanup:
      cron: ${OUTBOX_CLEANUP_CRON:0 0 * * * *}
      # 발행 완료 후 보관 기간(감사/디버깅).
      retention: ${OUTBOX_CLEANUP_RETENTION:P7D}
      batch-size: ${OUTBOX_CLEANUP_BATCH_SIZE:1000}
  # 게스트 주문 조회 Rate Limit(guest-lookup). IP 버킷으로 orderNumber+email 무차별 대입을 억제한다.
  order:
    rate-limit:
      guest-lookup:
        capacity: ${ORDER_RATE_LIMIT_GUEST_LOOKUP_CAPACITY:10}
        refill-period: ${ORDER_RATE_LIMIT_GUEST_LOOKUP_REFILL_PERIOD:PT1M}
  payment:
    # 결제 Rate Limit. post=결제 생성, JWT memberId 키잉(게스트·토큰 부재 시 IP 폴백).
    # webhook=토스 웹훅, 회원 토큰 없는 공개 엔드포인트라 별도 IP 버킷으로 분리(토스 피크 수용 + 단일 IP 증폭 캡).
    rate-limit:
      post:
        capacity: ${PAYMENT_RATE_LIMIT_POST_CAPACITY:5}
        refill-period: ${PAYMENT_RATE_LIMIT_POST_REFILL_PERIOD:PT1M}
      webhook:
        capacity: ${PAYMENT_RATE_LIMIT_WEBHOOK_CAPACITY:60}
        refill-period: ${PAYMENT_RATE_LIMIT_WEBHOOK_REFILL_PERIOD:PT1M}
    # 결제 웹훅 유실 대비 폴링 동기화. PENDING 결제를 interval 마다 PG query() 로 조회한다.
    reconciliation:
      interval: ${PAYMENT_RECONCILIATION_INTERVAL:PT1M}
      initial-delay: ${PAYMENT_RECONCILIATION_INITIAL_DELAY:PT1M}
      # 갓 접수된 결제는 정상 웹훅이 곧 도착하므로 폴링 대상에서 제외(created_at < now - min-age).
      min-age: ${PAYMENT_RECONCILIATION_MIN_AGE:PT1M}
      # 토스 미확정 PENDING(잠정 pgTx) 만료 한도. 결제위젯 체류 시간 이상으로 길게 둔다.
      # 초과 시 폴링 리퍼가 FAILED + 재고·쿠폰 보상으로 정리한다(failUrl 콜백은 상태 불변).
      toss-pending-timeout: ${PAYMENT_TOSS_PENDING_TIMEOUT:PT20M}
      # generic PG 폴링 종결 한도. query 가 영구 해소 불가(예: non-TOSS pgTx 404/502)일 때만 초과 시 FAILED 로 종결해
      # 무한 폴링을 끊는다. PG 가 정상 응답(PENDING 포함)하는 동안은 종결하지 않는다(느린 비동기 PG 오탐 방지).
      # 일시 장애 오탐을 피하려 min-age 보다 크게(부팅 시 max-age>min-age 검증).
      max-age: ${PAYMENT_RECONCILIATION_MAX_AGE:PT1H}
      # 한 주기 최대 건수(적체 시 메모리/PG 호출량 바운드). 나머지는 다음 주기.
      batch-size: ${PAYMENT_RECONCILIATION_BATCH_SIZE:200}
  # 배송 자동 진행. 실 택배사 연동 없음. interval 마다 PREPARING→SHIPPED→DELIVERED 를 한 단계씩 민다.
  # 시연 시 prepare-delay/ship-delay 를 수 초로 줄여 빠르게 진행시킨다.
  shipping:
    progress:
      interval: ${SHIPPING_PROGRESS_INTERVAL:PT2S}
      initial-delay: ${SHIPPING_PROGRESS_INITIAL_DELAY:PT5S}
      # PREPARING 에 prepare-delay 이상 머문 배송을 SHIPPED 로(이하 *-delay 동일 패턴).
      prepare-delay: ${SHIPPING_PROGRESS_PREPARE_DELAY:PT5S}
      ship-delay: ${SHIPPING_PROGRESS_SHIP_DELAY:PT5S}
      # 한 주기 최대 건수(적체 시 메모리 바운드). 나머지는 다음 주기.
      batch-size: ${SHIPPING_PROGRESS_BATCH_SIZE:200}
    # 배송 생성 보충 안전망. AFTER_COMMIT 배송 생성 실패로 PAID 인데 배송 없는 고아 주문을 스캔해 보충한다.
    # 정상 흐름에선 대상이 비는 저빈도 안전망.
    reconciliation:
      interval: ${SHIPPING_RECONCILIATION_INTERVAL:PT5M}
      initial-delay: ${SHIPPING_RECONCILIATION_INITIAL_DELAY:PT5M}
      # PAID 된 지 min-age 이상 지난 주문만 대상(갓 결제된 건은 리스너가 곧 처리).
      min-age: ${SHIPPING_RECONCILIATION_MIN_AGE:PT2M}
      batch-size: ${SHIPPING_RECONCILIATION_BATCH_SIZE:200}

  # 반품 자동 진행. 실 택배사 연동 없음. interval 마다 APPROVED→IN_TRANSIT→INSPECTING→REFUNDED 를 한 단계씩
  # 민다(검수 자동통과+환불 포함). 검수 불합격(REJECTED)만 관리자 수동. 시연 시 각 delay 를 수 초로 줄인다.
  claim:
    # 반품 가능 기한. 배송완료(delivered_at) 후 이 기간 이내만 접수.
    return-window: ${CLAIM_RETURN_WINDOW:P7D}
    progress:
      interval: ${CLAIM_PROGRESS_INTERVAL:PT2S}
      initial-delay: ${CLAIM_PROGRESS_INITIAL_DELAY:PT5S}
      # 각 상태에 해당 delay 이상 머문 반품을 다음 단계로(approve→IN_TRANSIT, transit→INSPECTING, inspect→REFUNDED).
      approve-delay: ${CLAIM_PROGRESS_APPROVE_DELAY:PT5S}
      transit-delay: ${CLAIM_PROGRESS_TRANSIT_DELAY:PT5S}
      inspect-delay: ${CLAIM_PROGRESS_INSPECT_DELAY:PT5S}
      # 한 주기 최대 건수(적체 시 메모리/PG 호출량 바운드). 나머지는 다음 주기.
      batch-size: ${CLAIM_PROGRESS_BATCH_SIZE:200}

  # 주문/배송 PII 익명화 배치(GDPR/개인정보). 배송완료 후 retention 지난 주문/배송의 수령인·주소·게스트 PII 를
  # 마스킹한다. 회원 본인 PII 는 탈퇴 즉시 익명화되지만, 배송지 PII 는 분쟁 대응 위해 보존기간 후 익명화한다
  # (특히 게스트 주문은 이 배치가 유일한 익명화 경로).
  privacy:
    order-anonymization:
      interval: ${ORDER_ANONYMIZATION_INTERVAL:PT1H}
      initial-delay: ${ORDER_ANONYMIZATION_INITIAL_DELAY:PT10M}
      # 배송완료 후 이 기간 지난 주문만 익명화.
      retention: ${ORDER_ANONYMIZATION_RETENTION:P90D}
      batch-size: ${ORDER_ANONYMIZATION_BATCH_SIZE:200}

# CORS 기본은 모든 origin 차단. 프로파일 yaml 또는 env 로 override 한다.
# 운영은 allowed-origins 를 명시적 도메인 화이트리스트로 설정.
cors:
  allowed-origin-patterns: []
  allowed-origins: []
  allowed-methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
  allowed-headers: ["*"]
  exposed-headers: [X-Request-Id]
  allow-credentials: false
  max-age-seconds: 3600

# Mock PG 동작 파라미터. Mock 프로파일(local/dev/test/docker)에서만 바인딩(prod 는 실 PG 구현체).
# webhook-secret 은 폴백 없는 env 주입(미설정 시 기동 실패가 의도된 동작). 폴백/고정값은 application-local/test.yaml.
payment:
  mock:
    success-rate: ${PAYMENT_MOCK_SUCCESS_RATE:0.95}
    delay-min: ${PAYMENT_MOCK_DELAY_MIN:100ms}
    delay-max: ${PAYMENT_MOCK_DELAY_MAX:500ms}
    webhook-delay-min: ${PAYMENT_MOCK_WEBHOOK_DELAY_MIN:1s}
    webhook-delay-max: ${PAYMENT_MOCK_WEBHOOK_DELAY_MAX:5s}
    webhook-secret: ${PAYMENT_MOCK_WEBHOOK_SECRET}
    # request() 후 webhook-delay 만큼 뒤에 PaymentWebhookHandler 로 결과 콜백을 자동 발사한다.
    # 통합 테스트는 결정적 검증을 위해 false 로 끄고 HTTP 웹훅/폴링을 직접 호출한다.
    auto-webhook: ${PAYMENT_MOCK_AUTO_WEBHOOK:true}
  # 토스페이먼츠 테스트 연동. dev/prod 에서만 바인딩(TossPaymentConfig @Profile).
  # secret-key 는 폴백 없는 env 주입(미설정 시 기동 실패가 의도된 동작). dev 폴백은 application-dev.yaml.
  toss:
    base-url: ${PAYMENT_TOSS_BASE_URL:https://api.tosspayments.com}
    client-key: ${PAYMENT_TOSS_CLIENT_KEY}
    secret-key: ${PAYMENT_TOSS_SECRET_KEY}
    success-url: ${PAYMENT_TOSS_SUCCESS_URL}
    fail-url: ${PAYMENT_TOSS_FAIL_URL}
    connect-timeout: ${PAYMENT_TOSS_CONNECT_TIMEOUT:2s}
    read-timeout: ${PAYMENT_TOSS_READ_TIMEOUT:5s}
    # 외부 PG 호출 재시도·서킷브레이커. 재시도는 일시 장애(5xx·연결 실패)만, confirm 워커 점유·UX 보호 위해
    # 보수적으로(2회·짧은 백오프). 서킷은 누적 실패율/느린호출율 임계 초과 시 OPEN.
    resilience:
      retry-max-attempts: ${PAYMENT_TOSS_RETRY_MAX_ATTEMPTS:2}
