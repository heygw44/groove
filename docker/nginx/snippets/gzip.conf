# groove gzip 압축 (이슈 #265) — http 컨텍스트(conf.d/*.conf)에 include 된다.
# nginx.conf(:80)·nginx-tls.conf(:443) 가 함께 include 하므로 한곳에서 관리한다(#270).
# 기본은 text/html 만 압축하고 프록시 응답(upstream=app)은 기본 미압축이라 gzip_proxied 로 켠다.
# https://nginx.org/en/docs/http/ngx_http_gzip_module.html
gzip on;
gzip_vary on;                 # Vary: Accept-Encoding
gzip_proxied any;             # 프록시 응답도 압축(기본 off)
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml;
