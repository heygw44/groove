# groove 공통 프록시 설정 (이슈 #265) — 각 location 에 include 한다.
# nginx 는 하위 컨텍스트에 add_header/proxy_set_header 가 하나라도 있으면 상위(server)를 상속하지 않고
# 교체하므로, 공통 항목을 snippet 으로 분리해 각 location 에 textual 삽입한다.
# proxy_set_header 4종: https://docs.nginx.com/nginx/admin-guide/web-server/reverse-proxy/
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;          # :80 → http, 443 블록 → https

# Referrer-Policy 는 Spring Security 기본 헤더에 없는 유일한 보안 헤더라 nginx 가 추가한다.
# (X-Frame-Options · X-Content-Type-Options · HSTS 는 Spring 이 이미 발급 → 중복 방지 위해 미추가)
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
