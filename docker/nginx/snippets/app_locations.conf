# groove 공통 location 블록 (이슈 #270) — server 컨텍스트에 include 한다.
# nginx.conf(:80)·nginx-tls.conf(:443) 가 동일한 프록시/정적 캐시 규칙을 공유하도록 추출했다.
# 전제: include 하는 server 블록이 `resolver`·`set $upstream app:8080;`·`client_max_body_size` 를 먼저 선언한다.

# 정적 자산: Spring Security 기본 Cache-Control(no-store) 을 걷어내고 장기 불변 캐시로 교체.
# add_header 는 upstream 헤더를 덮지 않고 '추가'하므로 먼저 proxy_hide_header 로 제거해야 한다.
location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp|map)$ {
    proxy_pass http://$upstream;
    include /etc/nginx/snippets/proxy_common.conf;

    proxy_hide_header Cache-Control;
    proxy_hide_header Pragma;
    proxy_hide_header Expires;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

# 그 외 전부 app 으로 위임 — API · index.html · SPA clean-route(SpaForwardConfig 가 forward 처리).
location / {
    proxy_pass http://$upstream;
    include /etc/nginx/snippets/proxy_common.conf;
}
