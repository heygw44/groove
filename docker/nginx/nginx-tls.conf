# groove 리버스 프록시 — HTTPS(:443) TLS 종단 (이슈 #270)
# nginx.conf(HTTP 데모)의 TLS 변형. docker-compose.tls.yml override 로만 마운트된다:
#   ./scripts/gen-self-signed-cert.sh                                   # certs/cert.pem · key.pem 생성
#   NGINX_CONF=nginx-tls.conf docker compose -f docker-compose.yml -f docker-compose.tls.yml up
#
# nginx 가 443 을 종단하고 X-Forwarded-Proto: https 를 전달 → app(forward-headers-strategy: native)이
# 이를 인식해 Secure refresh 쿠키와 HSTS 를 자동 발급한다(override 가 AUTH_REFRESH_COOKIE_SECURE=true 주입).
# 하이브리드 원칙상 HSTS 는 Spring 이 발급하므로 nginx 는 추가하지 않는다(중복 방지).
# 공통 gzip/location 은 nginx.conf 와 동일하게 snippets 로 공유한다.

include /etc/nginx/snippets/gzip.conf;

# HTTP → HTTPS 강제 리다이렉트
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# TLS 종단
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;   # Let's Encrypt/certbot 또는 self-signed(데모)
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # 공식 권장값 — https://nginx.org/en/docs/http/configuring_https_servers.html
    # (Mozilla/TLSRef intermediate 와 정합). TLSv1.0/1.1 은 제외.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    # SSL 핸드셰이크 재사용으로 CPU 절감(워커 간 공유 캐시, ~4000 세션/MB).
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream app:8080;
    client_max_body_size 10m;

    include /etc/nginx/snippets/app_locations.conf;
}
