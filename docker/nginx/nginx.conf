# groove 리버스 프록시 (이슈 #265)
# 단순 리버스 프록시 — Vue 산출물은 Spring static/ 에 번들돼 app 이 서빙하고(동일 오리진), nginx 는
# TLS 종단 · gzip · 정적 캐시 · Referrer-Policy 같은 횡단 관심사만 입힌다. nginx 는 LB 가 아닌 단일
# upstream(rate limit 버킷이 인스턴스 로컬 Caffeine 이라 단일 인스턴스 전제).
#
# 이 파일은 nginx 기본 이미지의 http{} 블록 안에 include 된다(/etc/nginx/conf.d/*.conf) → 아래
# gzip 지시어는 http 컨텍스트로 적용된다.

# --- gzip 압축 (https://docs.nginx.com/nginx/admin-guide/web-server/compression/) ---
# 기본은 text/html 만 압축하고, 프록시 응답(upstream=app)은 기본 미압축이라 gzip_proxied 로 켠다.
# gzip_comp_level · gzip_vary: https://nginx.org/en/docs/http/ngx_http_gzip_module.html
gzip on;
gzip_vary on;                 # Vary: Accept-Encoding
gzip_proxied any;             # 프록시 응답도 압축(기본 off)
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml;

server {
    listen 80;
    server_name _;

    # upstream(app)을 변수로 proxy_pass 하고 Docker 임베디드 DNS(127.0.0.11)로 매 요청 해석한다.
    # 리터럴 호스트명은 nginx 가 기동 시 1회만 해석해 캐시하므로, app 컨테이너가 재기동돼 IP 가 바뀌면
    # stale IP 로 계속 프록시해 502 가 난다(docker+nginx 고전 함정). 변수+resolver 로 회피.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream app:8080;

    # Spring multipart 기본 max-request-size(10MB)에 맞춘 본문 한도. nginx 기본(1m)보다 크게 잡되
    # 더 큰 업로드가 필요하면 app 설정과 함께 올린다.
    client_max_body_size 10m;

    # 정적 자산: Spring Security 기본 Cache-Control(no-store) 을 걷어내고 장기 불변 캐시로 교체.
    # add_header 는 upstream 헤더를 덮지 않고 '추가'하므로 먼저 proxy_hide_header 로 제거해야 한다.
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp|map)$ {
        proxy_pass http://$upstream;
        include /etc/nginx/snippets/proxy_common.conf;

        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # 그 외 전부 app 으로 위임 — API · index.html · SPA clean-route(SpaForwardConfig 가 forward 처리).
    location / {
        proxy_pass http://$upstream;
        include /etc/nginx/snippets/proxy_common.conf;
    }
}

