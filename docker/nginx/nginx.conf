# groove 리버스 프록시 — HTTP(:80) 기본 데모용 (이슈 #265, #270)
# 단순 리버스 프록시 — Vue 산출물은 Spring static/ 에 번들돼 app 이 서빙하고(동일 오리진), nginx 는
# gzip · 정적 캐시 · Referrer-Policy 같은 횡단 관심사만 입힌다. nginx 는 LB 가 아닌 단일
# upstream(rate limit 버킷이 인스턴스 로컬 Caffeine 이라 단일 인스턴스 전제).
#
# 이 파일은 nginx 기본 이미지의 http{} 블록 안에 include 된다(/etc/nginx/conf.d/*.conf).
# gzip(http 컨텍스트)·공통 location(server 컨텍스트)은 snippets 로 추출해 nginx-tls.conf 와 공유한다.
#
# ── TLS(HTTPS :443) 활성화는 nginx-tls.conf + docker-compose.tls.yml 로 분리(#270) ──
#   ./scripts/up-tls.sh    # 인증서 보장 + NGINX_CONF 고정 + compose 합성
#   상세: docs/ARCHITECTURE.md §10.6

include /etc/nginx/snippets/gzip.conf;

server {
    listen 80;
    server_name _;

    # upstream(app)을 변수로 proxy_pass 하고 Docker 임베디드 DNS(127.0.0.11)로 매 요청 해석한다.
    # 리터럴 호스트명은 nginx 가 기동 시 1회만 해석해 캐시하므로, app 컨테이너가 재기동돼 IP 가 바뀌면
    # stale IP 로 계속 프록시해 502 가 난다(docker+nginx 고전 함정). 변수+resolver 로 회피.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream app:8080;

    # Spring multipart 기본 max-request-size(10MB)에 맞춘 본문 한도. nginx 기본(1m)보다 크게 잡되
    # 더 큰 업로드가 필요하면 app 설정과 함께 올린다.
    client_max_body_size 10m;

    include /etc/nginx/snippets/app_locations.conf;
}
